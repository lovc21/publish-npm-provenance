name: Publish npm with Provenance
description: Publish packages to npm with provenance using pnpm.
author: lovc21

branding:
  icon: 'package'
  color: 'orange'

inputs:
  path:
    description: Path to the package root directory
    required: false
    default: '.'

  strict_version:
    description: Enforce that the git tag version matches package.json version
    required: false
    default: 'true'

  npm_access:
    description: Package access level - public or restricted
    required: false
    default: 'restricted'

  npm_provenance:
    description: Enable npm provenance (requires id-token write permission)
    required: false
    default: 'true'

  skip_publish:
    description: Skip the publish step
    required: false
    default: 'false'

  debug_mode:
    description: Enable debug output
    required: false
    default: 'false'

  regex_stable_tag:
    description: Regex to match stable release tags (e.g. v1.0.0 or service/v1.0.0)
    required: false
    default: '^([a-zA-Z0-9_-]+/)?v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

  regex_unstable_tag:
    description: Regex to match unstable release tags (e.g. v1.0.0-rc.1 or v1.0.0-alpha.1)
    required: false
    default: '^([a-zA-Z0-9_-]+/)?v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-(rc|alpha)\.(0|[1-9][0-9]*)$'

runs:
  using: node22
  main: dist/index.js
